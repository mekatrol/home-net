# Home monitor watchdog config
# Place the real version at /run/secrets/config.yaml (mounted from ./secrets/)

server:
  host: "0.0.0.0"
  port: 8765
  token: "change-me-to-something-secret"  # shared secret — same value in all device configs

# MQTT broker — only required if any devices use mqtt_topic (MQTT-only monitoring)
mqtt:
  broker: "mqtt.lan"
  port: 1883
  username: "watchdog"
  password: "secret"

# Email — optional; enables POP3 polling and SMTP sending
# email:
#   host: "mail.example.com"
#   username: "user@example.com"
#   password: "secret"
#   pop3_port: 995                  # SSL/TLS (default)
#   smtp_port: 587                  # STARTTLS (default)
#   poll_interval: 60               # seconds between POP3 polls (default)
#   store_dir: "/var/lib/emails"    # host path mounted via create.sh volume (default)
#   sent_retention_days: 30         # delete sent/ files older than this many days (0 = keep forever)
#   catchall:                       # per-domain forward address; omit to disable final sending
#     example.com: "catchall@example.com"
#     otherdomain.net: "catchall@otherdomain.net"
#
# Folder layout per account:
#   {store_dir}/{normalized_address}/inbox/       — freshly received from POP3
#   {store_dir}/{normalized_address}/processing/  — queued for AI spam filtering
#   {store_dir}/{normalized_address}/processed/   — AI-approved output waiting to be sent
#   {store_dir}/{normalized_address}/sent/        — forwarded successfully; auto-deleted after sent_retention_days
# Files are written atomically (.tmp → rename) for stage hand-offs.
# Messages are deleted from the POP3 server at fetch time.

log_level: info
status_interval: 10   # seconds between MQTT status publishes for all devices

devices:
  # WebSocket device — runs remote/main.py, supports reboot/upgrade commands
  - name: "Pi NAS Monitor"
    device_name: "pi-nas"           # must match client's server.device_name
    ping_interval: 30
    miss_threshold: 3
    reboot_cooldown: 300
    upgrade_reboot_time: "02:00"    # daily apt upgrade + reboot; omit to disable
    # upgrade_time: "02:40"         # daily apt upgrade, no reboot (for containers); omit to disable

  # Container device — WS-connected but runs in Docker; no reboot, uses restart_container instead
  - name: "My Container"
    device_name: "my-container"
    ping_interval: 30
    miss_threshold: 3
    reboot_cooldown: 300
    upgrade_time: "02:40"             # daily upgrade, no reboot
    container_device_name: "pi-nas"   # device_name of the docker host running this container
    container_name: "my-container"    # docker container name to restart

  - name: "NTP Server"
    device_name: "ntp"
    ping_interval: 30
    miss_threshold: 3
    reboot_cooldown: 300

  # HTTP-polled device — server polls a URL; 2xx = online, anything else or no answer = offline
  - name: "Irrigation Controller"
    http_url: "http://irrigation.lan/outputs/1"
    mqtt_device_name: "irrigation"
    ping_interval: 30           # poll every 30s
    miss_threshold: 3
    reboot_cooldown: 300
    status_retain_ttl: 120

  # MQTT-only device — cannot run WebSocket client; monitored via MQTT subscription only
  # Silence triggers a warning log; reboot is not possible
  - name: "Lego Train"
    mqtt_topic: "lego_train/state"  # presence of mqtt_topic marks this as MQTT-only
    mqtt_device_name: "pi-lego-train"
    ping_interval: 10
    miss_threshold: 3
    reboot_cooldown: 300
    status_retain_ttl: 60
